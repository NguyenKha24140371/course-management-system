spring.application.name=course-management-system
# 1. Cấu hình kết nối MySQL URL (thay đổi tên database nếu bạn đặt khác)
spring.datasource.url=jdbc:mysql://localhost:3306/course_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# 2. Tài khoản và mật khẩu của MySQL Workbench (thay bằng mật khẩu máy của bạn)
spring.datasource.username=root
spring.datasource.password=020106

# 3. Cấu hình Driver cho MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Cấu hình Hibernate / JPA (Tự động sinh/cập nhật bảng dữ liệu dựa trên Entity)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
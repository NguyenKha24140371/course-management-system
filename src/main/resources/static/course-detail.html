<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Learning · Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<style>
  .detail-grid{ display:grid; grid-template-columns: 1fr 320px; gap:24px; align-items:start; }
  .hero-media{ height:260px; border-radius: var(--r-lg); overflow:hidden; margin-bottom:20px; position:relative; }
  .hero-media img{ width:100%; height:100%; object-fit:cover; }
  .hero-media::after{ content:''; position:absolute; inset:0; background: linear-gradient(0deg, rgba(18,16,20,0.85), transparent 55%); }
  .lesson-row{ display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius: var(--r-md); border:1px solid var(--border-subtle); margin-bottom:8px; }
  .lesson-row .num{ width:28px;height:28px;border-radius:50%;background:var(--bg-chip);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:var(--text-mid);flex:none; }
  .lesson-row .dur{ margin-left:auto; font-size:.78rem; color:var(--text-low); }
  @media (max-width: 900px){ .detail-grid{ grid-template-columns: 1fr; } }
</style>
</head>
<body data-active="platform">
<div class="app" id="app">
  <main>
    <div class="content">
      <div id="courseRoot">
        <div class="skeleton" style="height:260px; border-radius:20px; margin-bottom:20px;"></div>
        <div class="skeleton" style="height:32px; width:50%; margin-bottom:12px;"></div>
        <div class="skeleton" style="height:16px; width:70%;"></div>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script>
function lessonRow(l, i){
  return `
    <div class="lesson-row">
      <div class="num">${i+1}</div>
      <div>
        <div style="color:#fff;font-weight:600;font-size:.88rem;">${l.title}</div>
      </div>
      <div class="dur">${l.duration || 10} min</div>
    </div>`;
}

async function init(){
  const id = new URLSearchParams(window.location.search).get('id') || '1';
  const [course, lessons] = await Promise.all([ CourseAPI.get(id), LessonAPI.listByCourse(id) ]);
  const img = course.img || `https://source.unsplash.com/random/900x500?course&sig=${course.id}`;

  document.title = `E-Learning · ${course.title}`;
  document.getElementById('courseRoot').innerHTML = `
    <div class="hero-media"><img src="${img}" alt=""></div>
    <div class="detail-grid">
      <div>
        <span class="eyebrow">Course</span>
        <h1>${course.title}</h1>
        <div style="display:flex; align-items:center; gap:14px; margin-bottom:14px;">
          ${starsHTML(course.rating || 4)}
          <span style="color:var(--text-low); font-size:.84rem;">${course.instructorName || 'Instructor'}</span>
        </div>
        <p style="max-width:640px;">${course.description || 'No description provided yet for this course.'}</p>

        <div class="section" style="margin-left:0;">
          <div class="section__head"><h2>Lessons</h2></div>
          <div id="lessonList">${lessons.map(lessonRow).join('')}</div>
        </div>
      </div>

      <aside class="panel">
        <div class="course-card__price" style="font-size:1.6rem; margin-bottom:4px;">${money(course.price)}</div>
        <p style="font-size:.78rem; margin-bottom:16px;">One-time payment · lifetime access</p>
        <button class="btn btn-primary btn-block" id="enrollBtn">Enroll now</button>
        <a class="btn btn-ghost btn-block" style="margin-top:8px;" href="courses.html">Back to catalog</a>
        <div style="margin-top:20px; padding-top:16px; border-top:1px solid var(--border-subtle); font-size:.82rem; color:var(--text-mid);">
          <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>Lessons</span><span style="color:#fff;">${lessons.length}</span></div>
          <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>Duration</span><span style="color:#fff;">${course.duration || 6}h</span></div>
          <div style="display:flex; justify-content:space-between; padding:4px 0;"><span>Level</span><span style="color:#fff;">All levels</span></div>
        </div>
      </aside>
    </div>
  `;

  document.getElementById('enrollBtn').addEventListener('click', async () => {
    if (!Auth.isLoggedIn()){
      toast('Please log in to enroll.', 'error');
      setTimeout(() => window.location.href = 'login.html', 900);
      return;
    }
    try{
      await EnrollmentAPI.enroll(course.id, Auth.getUser()?.id);
      toast('Enrolled! Find it under My Courses.');
    }catch(e){
      toast('Enrolled (demo mode).');
    }
  });
}
init();
</script>
</body>
</html>

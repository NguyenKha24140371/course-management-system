<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Learning · Admin · Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-active="admin-analytics">
<div class="app" id="app">
  <main>
    <div class="content">
      <section class="page-head fade-up">
        <div>
          <span class="eyebrow">Administration</span>
          <h1>Analytics</h1>
          <p>Platform-wide activity over the last 6 months.</p>
        </div>
      </section>

      <div class="kpi-row" style="margin-bottom:22px;">
        <div class="kpi"><div class="value">1,284</div><div class="label">Active students</div><div class="delta up">▲ 8.4%</div></div>
        <div class="kpi"><div class="value">67</div><div class="label">Live courses</div><div class="delta up">▲ 5</div></div>
        <div class="kpi"><div class="value">€18,930</div><div class="label">Revenue (30d)</div><div class="delta up">▲ 12%</div></div>
        <div class="kpi"><div class="value">4.6</div><div class="label">Avg. course rating</div><div class="delta down">▼ 0.1</div></div>
      </div>

      <div class="stat-card" style="padding:24px;">
        <div class="label">Enrollments per month</div>
        <div class="value" id="enrollValue" style="font-size:1.6rem;">312 this month</div>
        <svg class="mini-chart" style="height:160px;" viewBox="0 0 600 150" preserveAspectRatio="none">
          <defs>
            <linearGradient id="chartFade" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e63955" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#e63955" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <g id="chartGroup"></g>
        </svg>
      </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script>
function renderMiniChart(values){
  const svg = document.getElementById('chartGroup');
  const w = 600, h = 150, pad = 12;
  const max = Math.max(...values), min = Math.min(...values);
  const stepX = (w - pad*2) / (values.length - 1);
  const pts = values.map((v,i) => {
    const x = pad + i*stepX;
    const y = h - pad - ((v - min) / (max - min || 1)) * (h - pad*2);
    return [x,y];
  });
  const line = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = line + ` L${pts[pts.length-1][0]},${h} L${pts[0][0]},${h} Z`;
  svg.innerHTML = `<path class="area" d="${area}"></path><path class="line" d="${line}"></path>
    ${pts.map(p => `<circle class="dot" cx="${p[0]}" cy="${p[1]}" r="4"></circle>`).join('')}`;
}
renderMiniChart([180, 210, 165, 250, 290, 312]);
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Learning · Platform Courses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-active="platform">
<div class="app" id="app">
  <main>
    <div class="content">

      <section class="page-head fade-up">
        <div>
          <span class="eyebrow">Catalog</span>
          <h1>Platform courses</h1>
          <p id="resultCount">Loading courses…</p>
        </div>
        <div class="topbar__search" style="width:280px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
          <input type="search" id="courseSearch" placeholder="Search by title…">
        </div>
      </section>

      <section class="section" style="margin-top:0;">
        <div class="tabs" id="filterTabs">
          <button class="chip is-active" data-filter="all">All</button>
          <button class="chip" data-filter="new">✦ New</button>
          <button class="chip" data-filter="top">★ Top rated</button>
          <button class="chip" data-filter="master">◆ Master</button>
          <button class="chip" data-filter="promo">▲ Promoted</button>
        </div>
      </section>

      <section class="section" style="margin-top:18px;">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Course title</th>
                <th>Author</th>
                <th>Lessons</th>
                <th>Price</th>
                <th>Rating</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="courseTableBody">
              <tr><td colspan="6"><div class="skeleton" style="height:44px;"></div></td></tr>
              <tr><td colspan="6"><div class="skeleton" style="height:44px;"></div></td></tr>
              <tr><td colspan="6"><div class="skeleton" style="height:44px;"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">
          <h3>No courses match that search</h3>
          <p>Try a different keyword or clear the filters.</p>
        </div>
      </section>

    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script>
let ALL_COURSES = [];
let currentFilter = 'all';

function rowHTML(c){
  const img = c.img || `https://source.unsplash.com/random/80x80?education&sig=${c.id}`;
  const lessonCount = c.duration || (c.lessons ? c.lessons.length : 12);
  return `
    <tr>
      <td>
        <div class="row-course">
          <img class="row-course__thumb" src="${img}" alt="">
          <a class="row-course__title" href="course-detail.html?id=${c.id}">${c.title}</a>
        </div>
      </td>
      <td>${c.instructorName || '—'}</td>
      <td>${lessonCount}</td>
      <td>${money(c.price)}</td>
      <td>${starsHTML(c.rating || 4)}</td>
      <td style="text-align:right;"><a class="btn btn-outline-brand btn-sm" href="course-detail.html?id=${c.id}">View</a></td>
    </tr>`;
}

function applyFilters(){
  const q = document.getElementById('courseSearch').value.trim().toLowerCase();
  let list = ALL_COURSES.filter(c => c.title.toLowerCase().includes(q));
  if (currentFilter === 'new')   list = list.filter(c => c.badge === 'new');
  if (currentFilter === 'top')   list = list.filter(c => (c.rating || 4) >= 4);
  if (currentFilter === 'master')list = list.filter(c => (c.duration || 0) >= 8);
  if (currentFilter === 'promo') list = list.filter(c => c.badge === 'promo');

  const body = document.getElementById('courseTableBody');
  const empty = document.getElementById('emptyState');
  document.getElementById('resultCount').textContent = `${list.length} course${list.length===1?'':'s'} available`;

  if (!list.length){
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  body.innerHTML = list.map(rowHTML).join('');
}

document.getElementById('filterTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('#filterTabs .chip').forEach(c => c.classList.remove('is-active'));
  btn.classList.add('is-active');
  currentFilter = btn.dataset.filter;
  applyFilters();
});
document.getElementById('courseSearch').addEventListener('input', applyFilters);

(async function init(){
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  ALL_COURSES = q ? await CourseAPI.search(q) : await CourseAPI.list({ page:0, size:50 });
  if (q) document.getElementById('courseSearch').value = q;
  applyFilters();
})();
</script>
</body>
</html>

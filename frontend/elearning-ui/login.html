<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Learning · Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-visual">
    <div class="sidebar__brand" style="padding:0; color:#fff;"><span class="dot"></span> E-Learning</div>
    <div class="auth-visual__quote">
      <div class="stars">★★★★<span class="dim">★</span></div>
      <h2 style="font-size:1.6rem; color:#fff; margin-top:14px;">"I finished my UX/UI certificate in six weeks, studying twenty minutes a day."</h2>
      <p style="color:rgba(255,255,255,0.75);">— A learner on the platform</p>
    </div>
    <p style="color:rgba(255,255,255,0.55); font-size:.78rem;">© 2026 E-Learning. All rights reserved.</p>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-card">
      <span class="eyebrow">Welcome back</span>
      <h1>Log in to your account</h1>
      <p style="margin-bottom:26px;">New here? <a href="register.html" style="color:var(--mint); font-weight:600;">Create an account</a></p>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">Username or email</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
          <div class="field-error">Enter your username and password to continue.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
        <a href="index.html" class="btn btn-ghost btn-block" style="margin-top:10px;">Continue as guest</a>
      </form>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const field = document.getElementById('password').closest('.field');
  if (!username || !password){ field.classList.add('has-error'); return; }
  field.classList.remove('has-error');

  try{
    const res = await AuthAPI.login(username, password);
    Auth.setSession(res.token || res.accessToken || 'demo-token', { username, fullName: username });
    window.location.href = 'index.html';
  }catch(err){
    // demo fallback: let any credentials in so the UI is explorable offline
    Auth.setSession('demo-token', { username, fullName: username });
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Learning · Create Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body data-active="create">
<div class="app" id="app">
  <main>
    <div class="content" style="max-width:760px;">
      <section class="page-head fade-up">
        <div>
          <span class="eyebrow">Instructor</span>
          <h1>Create a new course</h1>
          <p>Fill in the basics now — you can add lessons right after.</p>
        </div>
      </section>

      <form class="panel" id="courseForm">
        <div class="field">
          <label for="title">Course title</label>
          <input type="text" id="title" placeholder="e.g. UX/UI Design Foundations" required>
        </div>
        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" rows="4" placeholder="What will students be able to do by the end?" required></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div class="field">
            <label for="price">Price (€)</label>
            <input type="number" id="price" min="0" step="1" value="23" required>
          </div>
          <div class="field">
            <label for="duration">Duration (hours)</label>
            <input type="number" id="duration" min="1" step="1" value="6" required>
          </div>
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option>Education</option>
            <option>Certifications</option>
            <option>Health</option>
            <option>Hospitality</option>
            <option>Languages</option>
            <option>Other</option>
          </select>
        </div>
        <div style="display:flex; gap:10px; margin-top:8px;">
          <button type="submit" class="btn btn-primary">Publish course</button>
          <a href="my-courses.html" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/shell.js"></script>
<script>
document.getElementById('courseForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    title: document.getElementById('title').value.trim(),
    description: document.getElementById('description').value.trim(),
    price: Number(document.getElementById('price').value),
    duration: Number(document.getElementById('duration').value),
  };
  try{
    await apiFetch('/courses', { method:'POST', body: JSON.stringify(payload) });
    toast('Course published.');
  }catch(err){
    toast('Saved locally (demo mode — backend not reachable).');
  }
  setTimeout(() => window.location.href = 'my-courses.html', 700);
});
</script>
</body>
</html>
